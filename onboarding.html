<!doctype html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakedo - Cá nhân hóa trải nghiệm</title>
  <!-- Global fonts & icons -->
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Onboarding specific styles -->
  <link rel="stylesheet" href="css/onboarding.css" />
</head>

<body>
  <div class="split-layout">
    <!-- Cột bên trái: Ảnh tủ lạnh -->
    <div class="image-section"></div>

    <!-- Cột bên phải: Content -->
    <div class="content-section">
      <div class="onboarding-panel">

        <!-- BƯỚC 1 -->
        <div id="step-1" class="onboarding-step">
          <div class="onboarding-wrapper">
            <h1 class="onboarding-title">Hãy cá nhân hóa trải nghiệm của bạn</h1>
            <button class="btn-preference" onclick="showStep(2)">Khẩu vị riêng - thực đơn riêng</button>
          </div>

          <!-- Next button -->
          <a href="javascript:void(0)" class="next-circle-btn" aria-label="Tiếp theo" onclick="showStep(2)">
            <i class="fa-solid fa-arrow-right"></i>
          </a>
        </div>

        <!-- BƯỚC 2 -->
        <div id="step-2" class="onboarding-step" style="display: none;">
          <div class="onboarding-wrapper">
            <h1 class="onboarding-title">Bạn có tuân thủ theo chế độ ăn kiêng nào?</h1>

            <div class="diet-options">
              <button class="diet-btn" data-value="vegan">Ăn thuần chay</button>
              <button class="diet-btn" data-value="weight_loss">Ăn giảm cân</button>
              <button class="diet-btn" data-value="flexible">Ăn tự do</button>
            </div>

            <div class="action-buttons">
              <button class="btn-continue-dark" onclick="showStep(3)">Tiếp tục</button>
              <a href="javascript:void(0)" class="btn-skip" onclick="showStep(3)">Bỏ qua</a>
            </div>
          </div>
        </div>
        
        <!-- BƯỚC 3 -->
        <div id="step-3" class="onboarding-step" style="display: none;">
          <div class="onboarding-wrapper">
            <img src="assets/images/onboard1.png" alt="Allergy" class="onboarding-illustration">
            <h1 class="onboarding-title" style="margin-bottom: 30px; font-size: 1.4rem;">Bạn đang bị dị ứng với thực phẩm nào?</h1>
            
            <div class="tag-options">
              <button class="tag-btn" data-value="Trứng">Trứng</button>
              <button class="tag-btn" data-value="Sữa">Sữa</button>
              <button class="tag-btn" data-value="Cá">Cá</button>
              <button class="tag-btn" data-value="Thịt đỏ">Thịt đỏ</button>
              <button class="tag-btn" data-value="Đậu phộng">Đậu Phộng</button>
              <button class="tag-btn" data-value="Hải sản">Hải Sản</button>
              <button class="tag-btn" data-value="Hạt">Hạt</button>
              <button class="tag-btn" data-value="Lúa mì">Lúa mì</button>
            </div>
            
            <div class="action-buttons">
              <button class="btn-continue-dark" onclick="showStep(4)">Tiếp tục</button>
              <a href="javascript:void(0)" class="btn-skip" onclick="showStep(4)">Bỏ qua</a>
            </div>
          </div>
        </div>

        <!-- BƯỚC 4 -->
        <div id="step-4" class="onboarding-step" style="display: none;">
          <div class="onboarding-wrapper">
            <img src="assets/images/onboard2.png" alt="Dislike" class="onboarding-illustration">
            <h1 class="onboarding-title" style="margin-bottom: 30px; font-size: 1.4rem;">Thực phẩm nào bạn không thích ?</h1>
            
            <div class="tag-options">
              <button class="tag-btn" data-value="Sầu riêng">Sầu riêng</button>
              <button class="tag-btn" data-value="Hành tây">Hành tây</button>
              <button class="tag-btn" data-value="Tỏi">Tỏi</button>
              <button class="tag-btn" data-value="Đồ cay">Đồ cay</button>
              <button class="tag-btn" data-value="Ớt chuông">Ớt chuông</button>
              <button class="tag-btn" data-value="Đậu phộng">Đậu phộng</button>
              <button class="tag-btn" data-value="Rau mùi">Rau mùi</button>
              <button class="tag-btn" data-value="Cá">Cá</button>
            </div>
            
            <div class="action-buttons">
              <button class="btn-continue-dark" onclick="showStep(5)">Tiếp tục</button>
              <a href="javascript:void(0)" class="btn-skip" onclick="showStep(5)">Bỏ qua</a>
            </div>
          </div>
        </div>

        <!-- BƯỚC 5 -->
        <div id="step-5" class="onboarding-step" style="display: none;">
          <div class="onboarding-wrapper">
            <img src="assets/images/onboard3.png" alt="Cuisine" class="onboarding-illustration">
            <h1 class="onboarding-title" style="margin-bottom: 30px; font-size: 1.4rem;">Ẩm thực nào bạn thích nhất?</h1>
            
            <div class="tag-options">
              <button class="tag-btn" data-value="Hàn Quốc">Hàn Quốc</button>
              <button class="tag-btn" data-value="Việt Nam">Việt Nam</button>
              <button class="tag-btn" data-value="Ý">Ý</button>
              <button class="tag-btn" data-value="Thái Lan">Thái Lan</button>
              <button class="tag-btn" data-value="Ấn Độ">Ấn Độ</button>
              <button class="tag-btn" data-value="Trung Quốc">Trung Quốc</button>
              <button class="tag-btn" data-value="Nhật Bản">Nhật Bản</button>
              <button class="tag-btn" data-value="Mỹ">Mỹ</button>
            </div>
            
            <div class="action-buttons">
              <button class="btn-continue-dark" onclick="completeOnboarding()">Tiếp tục</button>
              <a href="javascript:void(0)" class="btn-skip" onclick="skipOnboarding()">Bỏ qua</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/onboarding.js"></script>
</body>

</html>
