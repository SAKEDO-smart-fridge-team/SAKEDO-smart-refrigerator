<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakedo - Hộp Lưu Trữ Thông Minh (Đăng Ký)</title>
  <!-- Global fonts & icons -->
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- Login specific styles -->
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="split-layout">
    <!-- Cột bên trái: Ảnh tủ lạnh -->
    <div class="login-image-section"></div>
    
    <!-- Cột bên phải: Form đăng ký -->
    <div class="login-content-section">
      <div class="login-panel">
        <div class="login-wrapper">
          <h1 class="login-title">WELCOME SAKEDO!</h1>
          
          <div class="auth-tabs">
            <a href="login.html" class="auth-tab">Đăng nhập</a>
            <a href="register.html" class="auth-tab active">Đăng ký</a>
          </div>

          <form id="register-form" class="login-form" novalidate>
            <div class="input-group">
              <i class="fa-regular fa-user"></i>
              <input type="text" name="full_name" placeholder="Họ và tên" autocomplete="name" required />
            </div>

            <div class="input-group">
              <i class="fa-solid fa-phone" style="font-size: 0.95rem;"></i>
              <input type="tel" name="phone" placeholder="Số điện thoại" autocomplete="tel" required />
            </div>

            <div class="input-group">
              <i class="fa-regular fa-envelope"></i>
              <input type="email" name="email" placeholder="Email" autocomplete="email" required />
            </div>
            
            <div class="input-group">
              <i class="fa-regular fa-circle-dot"></i>
              <input type="password" name="password" placeholder="Password" autocomplete="new-password" required />
            </div>

            <p id="auth-message" class="auth-message" aria-live="polite"></p>

            <button type="submit" class="btn-continue" style="margin-top: 15px;">Đăng ký</button>
          </form>

          <div class="social-login">
            <p>Sign in With</p>
            <div class="social-icons">
              <div id="google-signin-button" class="google-signin-host" aria-label="Google sign-in button"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    window.SAKEDO_GOOGLE_CLIENT_ID = "";
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
