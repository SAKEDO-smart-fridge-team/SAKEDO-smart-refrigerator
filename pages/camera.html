<link rel="stylesheet" href="css/camera.css" />

<div class="camera-page">
  <div class="scan-workspace-card">
    <div class="scan-header">
      <h2 class="add-item-title">Nhận diện thực phẩm bằng AI</h2>
      <p class="scan-subtitle">Hỗ trợ chụp bằng camera hoặc tải ảnh lên, tự nhận diện nhiều vật thể và điền số lượng.</p>
    </div>

    <div class="camera-preview-wrap" id="camera-preview-wrap">
      <video id="camera-video" autoplay playsinline muted></video>
      <img id="captured-preview" alt="Ảnh đã chụp" />
      <div class="camera-empty" id="camera-empty">
        <i class="fa-solid fa-camera"></i>
        <p>Nhấn "Mở camera" hoặc "Tải ảnh" để bắt đầu</p>
      </div>
    </div>

    <div class="scan-toolbar">
      <button class="scan-btn" id="btn-open-camera">
        <i class="fa-solid fa-video"></i>
        <span>Mở camera</span>
      </button>
      <button class="scan-btn" id="btn-capture">
        <i class="fa-solid fa-camera-retro"></i>
        <span>Chụp ảnh</span>
      </button>
      <label class="scan-btn upload-btn" for="file-upload-image">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <span>Tải ảnh</span>
      </label>
      <input id="file-upload-image" type="file" accept="image/*" hidden />
      <button class="scan-btn primary" id="btn-run-detect">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>Nhận diện</span>
      </button>
      <button class="scan-btn ghost" id="btn-reset-shot">
        <i class="fa-solid fa-arrow-rotate-left"></i>
        <span>Làm mới</span>
      </button>
    </div>

    <div class="scan-status" id="scan-status"></div>

    <div class="form-actions">
      <button class="btn-back" onclick="navigate('home', document.querySelector('.nav-item'))">Trở về</button>
      <button class="btn-done" id="btn-go-result">Đến kết quả</button>
    </div>
  </div>

  <div class="manual-entry-card">
    <h3 class="manual-title">Hoặc nhập thủ công</h3>

    <div class="form-group" id="manual-name-group">
      <label class="form-label">Tên thực phẩm</label>
      <div class="input-with-icon">
        <img src="assets/images/cake.png" alt="" class="input-icon" />
        <input type="text" id="manual-item-name" placeholder="Ví dụ: Thịt bò" />
      </div>
    </div>

    <div class="form-group" id="manual-location-group">
      <label class="form-label">Vị trí lưu</label>
      <div class="location-options" id="manual-location-options">
        <button class="location-btn" data-location="tulanh" type="button">
          <img src="assets/images/tlanh.png" alt="" class="option-icon" />
          <span>Tủ lạnh</span>
        </button>
        <button class="location-btn" data-location="ngandong" type="button">
          <img src="assets/images/ngandong.png" alt="" class="option-icon" />
          <span>Ngăn đá</span>
        </button>
        <button class="location-btn" data-location="nganlanh" type="button">
          <img src="assets/images/tlanh.png" alt="" class="option-icon" />
          <span>Ngăn lạnh</span>
        </button>
      </div>
    </div>

    <div class="form-group" id="manual-category-group">
      <label class="form-label">Loại thực phẩm</label>
      <div class="category-options" id="manual-category-options">
        <button class="category-btn" data-category="milk" type="button">
          <img src="assets/images/milk.png" alt="" class="option-icon" />
          <span>Sữa và phô mai</span>
        </button>
        <button class="category-btn" data-category="thit" type="button">
          <img src="assets/images/thit.png" alt="" class="option-icon" />
          <span>Thịt và hải sản</span>
        </button>
        <button class="category-btn" data-category="traicay" type="button">
          <img src="assets/images/traicay.png" alt="" class="option-icon" />
          <span>Rau và trái cây</span>
        </button>
        <button class="category-btn" data-category="douong" type="button">
          <img src="assets/images/douong.png" alt="" class="option-icon" />
          <span>Đồ uống</span>
        </button>
        <button class="category-btn" data-category="khac" type="button">
          <img src="assets/images/khac.png" alt="" class="option-icon" />
          <span>Khác</span>
        </button>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group half" id="manual-expiry-group">
        <label class="form-label">Ngày hết hạn</label>
        <div class="input-with-icon date-input">
          <input type="date" id="manual-item-expiry" />
          <i class="fa-solid fa-chevron-down date-chevron"></i>
        </div>
      </div>
      <div class="form-group half" id="manual-quantity-group">
        <label class="form-label">Số lượng</label>
        <div class="input-with-icon quantity-input">
          <img src="assets/images/soluong.png" alt="" class="input-icon" />
          <input type="number" id="manual-item-quantity" value="1" min="1" />
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Ghi chú (tùy chọn)</label>
      <div class="note-wrapper">
        <i class="fa-regular fa-clipboard note-icon"></i>
        <textarea id="manual-item-note" placeholder="Thêm ghi chú về sản phẩm..." rows="3"></textarea>
      </div>
    </div>

    <div class="scan-status" id="manual-status"></div>

    <div class="form-actions manual-submit-row">
      <button class="btn-done" id="btn-manual-add">Thêm thủ công vào tủ</button>
    </div>
  </div>

  <div class="scan-loading-overlay" id="scan-loading-overlay">
    <div class="scan-loading-box">
      <div class="scan-spinner"></div>
      <h3>Đang nhận diện sản phẩm...</h3>
      <p>Hệ thống đang phân tích ảnh và đếm số lượng vật thể.</p>
    </div>
  </div>
</div>

<script src="js/camera.js"></script>
