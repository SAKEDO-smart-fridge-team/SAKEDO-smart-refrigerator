
<section class="cooking-steps-container">
  <div class="recipe-header">
    <div class="recipe-image-wrapper play-overlay-container">
      <img id="cooking-recipe-img" src="assets/img/canhchua.png" alt="Món ăn"
        onerror="this.src='https://via.placeholder.com/600x400?text=Food'" />
      <div class="play-overlay"></div>
    </div>
    <h2 class="recipe-title" id="cooking-recipe-title">CANH CHUA CÁ BÔNG LAU</h2>
    <img src="assets/img/Chè.png" alt="Mr. Chè" class="chef-mascot" />
  </div>

  <div class="steps-content">
    <h3 class="section-title">Công thức chuẩn vị:</h3>

    <div class="cooking-meta">
      <div class="meta-chip">
        <span class="meta-label">Thời gian</span>
        <strong id="cooking-prep-time">-- phút</strong>
      </div>
      <div class="meta-chip">
        <span class="meta-label">Nguyên liệu có sẵn</span>
        <strong id="cooking-available-count">0</strong>
      </div>
      <div class="meta-chip">
        <span class="meta-label">Cần bổ sung</span>
        <strong id="cooking-missing-count">0</strong>
      </div>
    </div>

    <div class="cooking-ingredients-grid">
      <div class="cooking-ingredients-box">
        <h4>Nguyên liệu sẵn có</h4>
        <ul id="cooking-available-ingredients"></ul>
      </div>
      <div class="cooking-ingredients-box">
        <h4>Nguyên liệu cần mua</h4>
        <ul id="cooking-missing-ingredients"></ul>
      </div>
    </div>

    <div id="cooking-steps-list">
      <!-- Dữ liệu sẽ được render từ JS để sau này AI trả JSON dễ tích hợp -->
    </div>
  </div>

  <div class="recipe-actions">
    <button class="btn-back" onclick="navigate('recipe-detail')">Trở về</button>
    <button class="btn-cook btn-finish" onclick="finishCooking()">Xong rồiiiii</button>
  </div>
</section>
