

<div class="dashboard-wrapper">
  <!-- Kho chứa lương thực -->
  <section class="db-section">
    <h2 class="section-title" data-i18n="db-storage-title">Kho chứa lương thực</h2>
    <div class="storage-cards">
      <div class="s-card card-fridge">
        <h3 data-i18n="db-fridge">TỦ LẠNH</h3>
        <p class="s-count">00</p>
        <div class="stars-bg"></div>
      </div>
      <div class="s-card card-freezer">
        <h3 data-i18n="db-freezer">NGĂN ĐÁ</h3>
        <p class="s-count">00</p>
        <div class="stars-bg"></div>
      </div>
      <div class="s-card card-pantry">
        <h3 data-i18n="db-pantry">NGĂN LẠNH</h3>
        <p class="s-count">00</p>
        <div class="stars-bg"></div>
      </div>
    </div>
  </section>

  <!-- Cần dùng ngay -->
  <section class="db-section db-urgent">
    <h2 class="section-title" data-i18n="db-urgent-title">Cần dùng ngay:</h2>
    <div class="urgent-cards">
      <div class="u-card card-expiring">
        <div class="u-content">
          <h4 data-i18n="db-expiring">SẮP HẾT HẠN</h4>
          <p class="u-count">0</p>
        </div>
        <div class="u-icon-svg">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="17" stroke="#F15A42" stroke-width="1.5" />
            <circle cx="20" cy="20" r="8" stroke="#F15A42" stroke-width="1.5" />
            <path d="M20 10 L25 18 L15 18 Z" stroke="#F15A42" stroke-width="1.5" />
            <path
              d="M20 3 L20 12 M37 20 L28 20 M3 20 L12 20 M20 37 L20 28 M32 8 L26 14 M8 32 L14 26 M32 32 L26 26 M8 8 L14 14"
              stroke="#F15A42" stroke-width="1.5" />
          </svg>
        </div>
      </div>
      <div class="u-card card-stats">
        <div class="u-content">
          <h4 data-i18n="db-stats">THỐNG KÊ</h4>
          <p class="u-count">0</p>
        </div>
        <div class="u-icon-svg">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="17" stroke="#5B9B93" stroke-width="1.5" />
            <circle cx="20" cy="20" r="8" stroke="#5B9B93" stroke-width="1.5" />
            <path d="M20 10 L25 18 L15 18 Z" stroke="#5B9B93" stroke-width="1.5" />
            <path
              d="M20 3 L20 12 M37 20 L28 20 M3 20 L12 20 M20 37 L20 28 M32 8 L26 14 M8 32 L14 26 M32 32 L26 26 M8 8 L14 14"
              stroke="#5B9B93" stroke-width="1.5" />
          </svg>
        </div>
      </div>
    </div>
  </section>

  <!-- Charts row -->
  <section class="db-section charts-row">
    <div class="chart-card nutrition-chart-card">
      <div class="card-header">
        <h4 data-i18n="db-nutrition-title">Phân loại dinh dưỡng</h4>
      </div>
      <div class="nutrition-content">
        <div class="legend">
          <div class="leg-item"><span class="dot c-red"></span> 0 <br /><small data-i18n="db-protein">Đạm</small></div>
          <div class="leg-item"><span class="dot c-teal"></span> 0 <br /><small data-i18n="db-veggies">Rau củ</small></div>
          <div class="leg-item"><span class="dot c-pink"></span> 0 <br /><small data-i18n="db-carbs">Tinh bột/ Gia vị</small></div>
        </div>
        <div class="chart-circle empty-chart">
          <div class="circle-inner">0</div>
        </div>
      </div>
    </div>

    <div class="chart-card capacity-chart-card">
      <div class="card-header">
        <div class="icon-fridge-status"><i class="fa-solid fa-temperature-empty"></i></div>
        <h4 data-i18n="db-status-title">Tình trạng Tủ lạnh</h4>
      </div>
      <div class="capacity-content">
        <div class="cap-info">
          <h2>0%</h2>
          <p data-i18n="db-empty">CÒN TRỐNG</p>
        </div>
        <div class="half-donut">
          <!-- CSS-based semi circle -->
          <div class="semi-circle-bg empty-bg">
            <div class="semi-circle-fill empty-fill">
            </div>
            <span class="fill-label">0% <i class="fa-solid fa-flask"></i></span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Bottom Line Chart -->
  <section class="db-section full-chart">
    <div class="chart-card">
      <div class="chart-header">
        <h4 data-i18n="db-waste-stats">Thống kê lãng phí thực phẩm hàng tuần</h4>
      </div>
      <div class="chart-legends-top">
        <span class="leg-item"><span class="dot c-teal"></span> <span data-i18n="db-intake">Lượng thực nạp vào</span></span>
        <span class="leg-item"><span class="dot c-pink"></span> <span data-i18n="db-cooked">Lượng thực đã được nấu</span></span>
      </div>
      <div class="line-chart-area">
        <!-- SVG for chart presentation -->
        <svg viewBox="0 0 800 300" class="line-chart-svg" preserveAspectRatio="none">
          <!-- background grid -->
          <path d="M 50 50 L 800 50" stroke="#f0f0f0" fill="none" />
          <path d="M 50 100 L 800 100" stroke="#f0f0f0" fill="none" />
          <path d="M 50 150 L 800 150" stroke="#f0f0f0" fill="none" />
          <path d="M 50 200 L 800 200" stroke="#f0f0f0" fill="none" />
          <path d="M 50 250 L 800 250" stroke="#f0f0f0" fill="none" />

          <!-- axes text -->
          <text x="10" y="55" class="axis-lbl">5k</text>
          <text x="10" y="105" class="axis-lbl">4k</text>
          <text x="10" y="155" class="axis-lbl">3k</text>
          <text x="10" y="205" class="axis-lbl">2k</text>
          <text x="10" y="255" class="axis-lbl">1k</text>

          <!-- data lines -->
          <path d="M 60 250 L 780 250" stroke="#4edbba" stroke-width="3" fill="none" class="chart-line-one" />
          <path d="M 60 248 L 780 248" stroke="#f486a4" stroke-width="3" fill="none" class="chart-line-two" />

          <!-- x-axis text -->
          <text x="80" y="280" class="axis-lbl">1k</text>
          <text x="150" y="280" class="axis-lbl">2k</text>
          <text x="220" y="280" class="axis-lbl">3k</text>
          <text x="290" y="280" class="axis-lbl">4k</text>
          <text x="360" y="280" class="axis-lbl">5k</text>
          <text x="430" y="280" class="axis-lbl">6k</text>
          <text x="500" y="280" class="axis-lbl">7k</text>
          <text x="570" y="280" class="axis-lbl">8k</text>
          <text x="640" y="280" class="axis-lbl">9k</text>
          <text x="710" y="280" class="axis-lbl">10k</text>
          <text x="780" y="280" class="axis-lbl">12k</text>
        </svg>
      </div>
    </div>
  </section>
</div>
