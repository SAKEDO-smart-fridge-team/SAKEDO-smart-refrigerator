<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakedo - Quên Mật Khẩu</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="split-layout">
    <div class="login-image-section"></div>

    <div class="login-content-section">
      <div class="login-panel">
        <div class="login-wrapper">
          <h1 class="login-title">QUÊN MẬT KHẨU</h1>

          <div class="auth-tabs">
            <a href="login.html" class="auth-tab">Đăng nhập</a>
            <a href="forgot-password.html" class="auth-tab active">Quên mật khẩu</a>
          </div>

          <form id="forgot-form" class="login-form" novalidate>
            <div class="input-group">
              <i class="fa-regular fa-envelope"></i>
              <input type="email" name="email" placeholder="Nhập email tài khoản" autocomplete="email" required />
            </div>

            <p id="auth-message" class="auth-message" aria-live="polite"></p>

            <button type="submit" class="btn-continue">Gửi yêu cầu đặt lại</button>
          </form>

          <div class="social-login">
            <p><a href="login.html" class="forgot-pwd">Quay lại đăng nhập</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
