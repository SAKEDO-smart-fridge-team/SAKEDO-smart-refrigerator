<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakedo - Đặt Lại Mật Khẩu</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <div class="split-layout">
    <div class="login-image-section"></div>

    <div class="login-content-section">
      <div class="login-panel">
        <div class="login-wrapper">
          <h1 class="login-title">ĐẶT LẠI MẬT KHẨU</h1>

          <div class="auth-tabs">
            <a href="login.html" class="auth-tab">Đăng nhập</a>
            <a href="reset-password.html" class="auth-tab active">Mật khẩu mới</a>
          </div>

          <form id="reset-form" class="login-form" novalidate>
            <input type="hidden" id="reset-token" name="token" />

            <div class="input-group">
              <i class="fa-regular fa-circle-dot"></i>
              <input type="password" name="new_password" placeholder="Mật khẩu mới" autocomplete="new-password" required />
            </div>

            <div class="input-group">
              <i class="fa-regular fa-circle-dot"></i>
              <input type="password" name="confirm_password" placeholder="Xác nhận mật khẩu mới" autocomplete="new-password" required />
            </div>

            <p id="auth-message" class="auth-message" aria-live="polite"></p>

            <button type="submit" class="btn-continue">Cập nhật mật khẩu</button>
          </form>

          <div class="social-login">
            <p><a href="login.html" class="forgot-pwd">Quay lại đăng nhập</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
