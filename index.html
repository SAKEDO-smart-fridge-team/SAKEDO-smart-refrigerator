    </div>

    <div class="main-wrapper">
      <header class="topbar">
        <div id="auth-buttons" class="auth-buttons" style="display: none;">

          <a href="register.html" class="btn-register" data-i18n="top-register">Đăng ký</a>
        </div>

        <div class="user-profile" id="user-profile" style="display: none;">
          <img src="assets/img/avatar.jpg" class="user-avatar"
            onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iI2NjYyIvPjwvc3ZnPg=='" />

            <span data-i18n="top-welcome-back">Welcome back</span>
          </div>
        </div>

        <div class="search-container">
          <input type="text" placeholder="" data-i18n="top-search-placeholder" />
          <button class="btn-search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">

              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>

        <div class="topbar-logo">

            onerror="this.onerror = null; this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxNTAiIGhlaWdodD0iNTAiPjx0ZXh0IHg9IjEwIiB5PSIzMCIgZm9udC1mYW1pbHk9ImFyaWFsIiBmb250LXNpemU9IjIwIj5TQUtFRE88L3RleHQ+PC9zdmc+';" />
        </div>
        <a href="login.html" id="logout-link" data-i18n="top-logout"
          style="margin-left: 12px; font-size: 0.92rem; color: #6a7780; text-decoration: none;">Đăng xuất</a>
      </header>

      <main id="app-root"></main>
    </div>

  <script src="js/i18n.js"></script>

  <script src="js/router.js"></script>
  <script src="js/main.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/recipe-engine.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/recipe-detail.js"></script>
  <script src="js/cooking-steps.js"></script>
  <script src="js/favorite.js"></script>
  <script src="js/fridge.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/ripple.js"></script>
  <script>
    // Định vị camera-bulge bám theo camera-btn (vì camera-bulge dùng position:fixed)
    function updateCameraBulge() {
      const btn = document.querySelector('.camera-btn');
      const bulge = document.getElementById('camera-bulge');
      if (!btn || !bulge) return;
      const rect = btn.getBoundingClientRect();
      bulge.style.left = rect.right + 'px';
      bulge.style.top = (rect.top + rect.height / 2) + 'px';
    }

    document.addEventListener('DOMContentLoaded', function () {
      updateCameraBulge();

      // Theo dõi sidebar expand/collapse (transition width)
      const sidebar = document.querySelector('.sidebar');
      if (sidebar && window.ResizeObserver) {
        new ResizeObserver(updateCameraBulge).observe(sidebar);
      }

      // Cập nhật khi resize cửa sổ
      window.addEventListener('resize', updateCameraBulge);

      // Cập nhật sau mỗi lần đổi trang
      document.addEventListener('pageChanged', function () {
        requestAnimationFrame(updateCameraBulge);
      });
    });
  </script>
</body>

</html>
